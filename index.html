<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-search.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        
        #title-header {
            background-color: #ffffff;
            color: #333;
            text-align: center;
            padding: 10px 0;
            margin: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        /* Layout untuk Sidebar dan Peta */
        #main-container {
            display: flex;
            flex-direction: row;
            flex-grow: 1;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #ccc;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        #map {
            flex-grow: 1;
            height: 100%;
        }

        .search-container {
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .info-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            margin-top: 10px;
        }

        .info-box h3 {
            margin-top: 0;
            font-size: 16px;
            color: #d63384;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .info-table {
            width: 100%;
            font-size: 13px;
        }

        .info-table tr td {
            padding: 5px 0;
        }

        .info-table tr td:first-child {
            font-weight: bold;
            color: #666;
        }
        </style>
        <title>TAMAN PERUMAHAN</title>
    </head>
    <body>
        <h1 id="title-header">TAMAN PERUMAHAN</h1>

        <div id="main-container">
            <div id="sidebar">
                <div class="search-container">
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">Cari No. Lot:</label>
                    <select id="lotSearchSelect" onchange="zoomToLot(this.value)">
                        <option value="">-- Pilih No Lot --</option>
                    </select>
                </div>

                <div id="lotInfo" class="info-box" style="display:none;">
                    <h3>MAKLUMAT</h3>
                    <div id="detailsContent"></div>
                </div>
            </div>

            <div id="map"></div>
        </div>
        
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="js/leaflet-search.js"></script>
        <script src="data/POLYGONIZEE_1.js"></script>
        <script src="data/LOTFINAL_2.js"></script>
        <script src="data/TANDASEMPADAN_3.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[2.1022779341308064,102.52037699699693],[2.1050033227290808,102.52490225827017]]);
        
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                }
            }
        }

        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);

        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
        });
        map.addLayer(layer_GoogleSatellite_0);

        // LAYER POLYGONIZEE
        function style_POLYGONIZEE_1_0() {
            return {
                pane: 'pane_POLYGONIZEE_1',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(225,89,137,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_POLYGONIZEE_1');
        map.getPane('pane_POLYGONIZEE_1').style.zIndex = 401;
        var layer_POLYGONIZEE_1 = new L.geoJson(json_POLYGONIZEE_1, {
            pane: 'pane_POLYGONIZEE_1',
            style: style_POLYGONIZEE_1_0,
        });
        map.addLayer(layer_POLYGONIZEE_1);

        // LAYER LOTFINAL (UTAMA UNTUK CARIAN)
        function style_LOTFINAL_2_0() {
            return {
                pane: 'pane_LOTFINAL_2',
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(152,125,183,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_LOTFINAL_2');
        map.getPane('pane_LOTFINAL_2').style.zIndex = 402;
        
        var layer_LOTFINAL_2 = new L.geoJson(json_LOTFINAL_2, {
            pane: 'pane_LOTFINAL_2',
            style: style_LOTFINAL_2_0,
            onEachFeature: function(feature, layer) {
                // Tambah ke senarai dropdown carian
                var select = document.getElementById('lotSearchSelect');
                var option = document.createElement('option');
                option.value = feature.properties['NO_LOT'];
                option.text = "Lot " + feature.properties['NO_LOT'];
                select.appendChild(option);

                layer.on({
                    click: function(e) {
                        displayLotInfo(feature.properties);
                    }
                });
            }
        });
        map.addLayer(layer_LOTFINAL_2);

        // FUNGSI ZOOM DAN TUNJUK MAKLUMAT
        function zoomToLot(lotNo) {
            if (!lotNo) return;
            
            layer_LOTFINAL_2.eachLayer(function(layer) {
                if (layer.feature.properties['NO_LOT'] == lotNo) {
                    // Zoom ke lot
                    map.fitBounds(layer.getBounds(), {padding: [50, 50]});
                    
                    // Highlight dan buka maklumat
                    displayLotInfo(layer.feature.properties);
                    
                    // Trigger popup pada peta juga
                    layer.bindPopup("Lot: " + lotNo).openPopup();
                }
            });
        }

        function displayLotInfo(props) {
            var infoDiv = document.getElementById('lotInfo');
            var content = document.getElementById('detailsContent');
            infoDiv.style.display = 'block';

            var html = '<table class="info-table">';
            html += '<tr><td>NO LOT</td><td>: ' + (props['NO_LOT'] || '-') + '</td></tr>';
            html += '<tr><td>KELUASAN</td><td>: ' + (props['AREA'] || '-') + '</td></tr>';
            html += '<tr><td>TSP HA</td><td>: ' + (props['DAERAH'] || '-') + '</td></tr>';
            html += '<tr><td>TSP PE</td><td>: ' + (props['PEMILIK'] || '-') + '</td></tr>';
            html += '</table>';
            
            content.innerHTML = html;
        }

        // LAYER TANDASEMPADAN
        function style_TANDASEMPADAN_3_0() {
            return {
                pane: 'pane_TANDASEMPADAN_3',
                radius: 4.0,
                color: 'rgba(35,35,35,1.0)',
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(183,72,75,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_TANDASEMPADAN_3');
        map.getPane('pane_TANDASEMPADAN_3').style.zIndex = 403;
        var layer_TANDASEMPADAN_3 = new L.geoJson(json_TANDASEMPADAN_3, {
            pane: 'pane_TANDASEMPADAN_3',
            pointToLayer: function (feature, latlng) {
                return L.circleMarker(latlng, style_TANDASEMPADAN_3_0());
            },
        });
        map.addLayer(layer_TANDASEMPADAN_3);

        resetLabels([layer_POLYGONIZEE_1, layer_TANDASEMPADAN_3]);
        map.on("zoomend layeradd layerremove", function(){
            resetLabels([layer_POLYGONIZEE_1, layer_TANDASEMPADAN_3]);
        });
        </script>        
    </body>
</html>
